version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Anthropic and HuggingFace SDKs move fast and the Stage-A and
      # upload paths are tested manually before a release; bump these
      # deliberately, not weekly.
      - dependency-name: "anthropic"
      - dependency-name: "huggingface_hub"
